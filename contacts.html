<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Контактна інформація">
    <meta name="author" content="Твоє Ім'я">
    <title>Контакти — Портфоліо</title>
</head>
<body>
    <header>
        <h1>Зв'яжіться зі мною</h1>
        <nav>
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="about.html">Про мене</a></li>
                <li><strong>Контакти</strong></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Контактні дані</h2>
            <p>Email: <a href="mailto:your-email@example.com">your-email@example.com</a></p>
            <p>Телефон: <a href="tel:+380000000000">+38 (000) 000-00-00</a></p>

            <form action="#" method="post">
                <fieldset>
                    <legend>Контактна інформація</legend>
                    <label for="name">Ім'я:</label>
                    <input type="text" id="name" name="name" placeholder="Введіть ваше ім'я" required>
                    <br><br>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="email@example.com" required>
                </fieldset>

                <fieldset>
                    <legend>Повідомлення</legend>
                    <label for="subject">Тема:</label>
                    <select id="subject" name="subject" required>
                        <option value="">-- Оберіть тему --</option>
                        <option value="general">Загальне питання</option>
                        <option value="cooperation">Співпраця</option>
                        <option value="feedback">Відгук</option>
                    </select>

                    <p>Тип звернення:</p>
                    <label>
                        <input type="radio" name="type" value="question" required checked> Питання
                    </label>
                    <label>
                        <input type="radio" name="type" value="suggestion"> Пропозиція
                    </label>

                    <br><br>
                    <label for="message">Повідомлення:</label><br>
                    <textarea id="message" name="message" rows="5" placeholder="Ваше повідомлення"></textarea>
                </fieldset>

                <br>
                <label>
                    <input type="checkbox" name="consent" required>
                    Я погоджуюсь на обробку персональних даних
                </label>
                <br><br>
                <button type="submit">Надіслати</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Лебедєв. Всі права захищені.</p>
    </footer>
</body>
</html>
